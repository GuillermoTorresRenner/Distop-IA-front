name: Deploy QA Frontend to Hostinger VPS

on:
  push:
    branches:
      - QA

env:
  DOCKERHUB_REPOSITORY: lebateleur/distop-ia-frontend
  PROJECT_PATH: /home/deployer/proyectos/distop-ia/qa/front

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set QA environment variables
        run: |
          echo "DOCKERHUB_REPOSITORY=$DOCKERHUB_REPOSITORY" > .env
          echo "${{ secrets.QA_ENV_VARS }}" >> .env

      - name: Extract VITE_API_URL from env
        id: extract_env
        run: |
          VITE_API_URL=$(grep VITE_API_URL .env | cut -d '=' -f2)
          echo "VITE_API_URL=$VITE_API_URL" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build, tag, and push Docker image to Docker Hub
        run: |
          docker build --build-arg VITE_API_URL=${{ steps.extract_env.outputs.VITE_API_URL }} -t $DOCKERHUB_REPOSITORY:latest .
          docker push $DOCKERHUB_REPOSITORY:latest

      - name: Upload files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.qa.yml,.env"
          target: ${{ env.PROJECT_PATH }}/
          strip_components: 0

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DOCKERHUB_REPOSITORY,PROJECT_PATH
          script: |
            echo "Starting deployment..."
            mkdir -p $PROJECT_PATH
            cd $PROJECT_PATH
            echo "Current directory: $(pwd)"
            echo "Listing files in project path:"
            ls -la
            if [ ! -f docker-compose.qa.yml ]; then
              echo "ERROR: docker-compose.qa.yml not found in $PROJECT_PATH"
              exit 1
            fi
            echo "Renaming docker-compose.qa.yml to docker-compose.yml..."
            rm -f docker-compose.yml
            mv docker-compose.qa.yml docker-compose.yml
            if [ ! -f docker-compose.yml ]; then
              echo "ERROR: docker-compose.yml not found in $PROJECT_PATH"
              echo "Checking if uploaded elsewhere..."
              find /home -name "docker-compose.yml" 2>/dev/null || echo "docker-compose.yml not found anywhere"
              exit 1
            fi
            echo "Stopping existing containers..."
            docker compose down || echo "No containers to stop or error in down"
            echo "Pulling latest image..."
            docker pull $DOCKERHUB_REPOSITORY:latest || echo "Failed to pull image"
            echo "Starting containers..."
            docker compose up -d || echo "Failed to start containers"
            echo "Checking container status..."
            docker compose ps
            echo "Deployment to VPS completed successfully."

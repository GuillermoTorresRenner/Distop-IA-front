name: Deploy QA Frontend to Hostinger VPS

on:
  workflow_dispatch:
  push:
    branches:
      - QA
   

env:
  PROJECT_PATH: /home/deployer/proyectos/distop-ia/qa/front
  DOCKER_IMAGE: lebateleur/distop-ia-front
  COMPOSE_PROJECT_NAME: distop_ia_qa
  VITE_API_URL: https://api-distop-ia.guillermotorresdev.com/api

jobs:
  build-and-push:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'front/package-lock.json'

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Type check
        working-directory: front
        run: npm run typecheck

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        working-directory: front
        run: |
          COMMIT_TAG=${{ github.sha }}
          docker build \
            --build-arg VITE_API_URL=${{ env.VITE_API_URL }} \
            -t ${{ env.DOCKER_IMAGE }}:qa-$COMMIT_TAG \
            -t ${{ env.DOCKER_IMAGE }}:qa \
            .
          docker push ${{ env.DOCKER_IMAGE }}:qa-$COMMIT_TAG
          docker push ${{ env.DOCKER_IMAGE }}:qa

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: PROJECT_PATH,DOCKER_IMAGE,COMPOSE_PROJECT_NAME
          script: |
            set -e
            echo "=========================================="
            echo "Starting QA frontend deployment..."
            echo "=========================================="
            mkdir -p $PROJECT_PATH
            cd $PROJECT_PATH

            # Pull latest QA frontend image
            docker pull ${{ env.DOCKER_IMAGE }}:qa

            # Update container if running
            CONTAINER_ID=$(docker ps -q -f "name=distop_ia_qa_front" || true)
            if [ ! -z "$CONTAINER_ID" ]; then
              echo "Stopping existing QA frontend container..."
              docker stop $CONTAINER_ID
              docker rm $CONTAINER_ID
            fi

            echo "Starting new QA frontend container..."
            docker run -d \
              --name distop_ia_qa_front \
              --restart unless-stopped \
              -p 3002:3000 \
              --network distop_ia_qa_internal_net \
              ${{ env.DOCKER_IMAGE }}:qa

            echo "=========================================="
            echo "QA frontend deployment completed successfully!"
            echo "=========================================="
